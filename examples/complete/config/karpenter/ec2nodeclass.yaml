apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: KarpenterNodeRole

  amiFamily: Bottlerocket   # 🔴 REQUIRED

  amiSelectorTerms:
    - id: ami-0ab67cc1bce5a8145

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: sandkube-eks-cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: sandkube-eks-cluster
