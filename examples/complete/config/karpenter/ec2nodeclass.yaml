apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: helm-addons-test-cluster-node_group

  amiFamily: Bottlerocket   # 🔴 REQUIRED

  amiSelectorTerms:
    - id: ami-0ab67cc1bce5a8145
         # -- Get valid AMI ID by:
         # aws ssm get-parameter --name /aws/service/bottlerocket/aws-k8s-1.29/x86_64/latest/image_id  --query "Parameter.Value" --output text --region us-east-1

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: helm-addons-test-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: helm-addons-test-cluster