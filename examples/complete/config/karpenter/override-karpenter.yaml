## Node affinity for particular node in which labels key is "Infra-Services" and value is "true
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: "eks.amazonaws.com/nodegroup"
          operator: In
          values:
          - "applications-nodes"

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 1
    memory: 1Gi

podAnnotations:
  co.elastic.logs/enabled: "true"

replicas: 1