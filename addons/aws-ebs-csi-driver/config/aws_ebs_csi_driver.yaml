## No default nodegroup selector; callers can override via helm_config.values
controller:
  affinity: {}
  ## Using limits and requests
  resources:
    limits:
      cpu: 300m
      memory: 250Mi
    requests:
      cpu: 50m
      memory: 150Mi

node:
  affinity: {}

  ## Using limits and requests
  resources:
    limits:
      cpu: 300m
      memory: 250Mi
    requests:
      cpu: 50m
      memory: 150Mi

podAnnotations:
  co.elastic.logs/enabled: "true"
